about_profile_image: images/profile_pic.JPG
about_content: | # this will include new lines to allow paragraphs
  Nice to meet you! I am Yuanchu Liang based in Australia, Canberra. I am doing a computer science PhD, supervised by Prof. Hanna Kurniawati, at the Robust Decision Making and Learning Lab, The Australian National Univeristy (ANU).
  Before this, I finished my high school in Adelaide, and graduated with a double degree in Engineering and Science from the ANU.
  
  My research direction focuses on building robust general purpose sequential decision making systems with application in robotics. 
  It is my hope to see robots becoming an essential ingredient in our daily life in the future, just like smart phones today. 
  To achieve this, I want to extent robots' capabilities in handling uncertainties from the real world and efficiently learning useful patterns from the environment.
  
  In particular, I am interested in the Partially Observable Markov Decision Process (POMDP) and designing scalable POMDP solution methods for Robotics motion planning under uncertainties. 
  On the learning aspects, I look into sample efficient reinforcement learning algorithms, transfer learnings and generalisations under uncertainties.

  Outside of work, I love meeting new people, sharing new ideas, reading books and climbing rocks, the latter has has became my way of meditation :)

